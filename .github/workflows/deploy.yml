# Deploys the built app (dist/ only) to GitHub Pages at tollab.co.il.
#
# Manual-dispatch only while the rebuild branch is in progress, so the live
# site is never replaced accidentally. At cutover, add:
#   push:
#     branches: [main]
name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Verify Firebase secrets are configured
        run: |
          if [ -z "${{ secrets.FIREBASE_API_KEY }}" ]; then
            echo "::error::FIREBASE_API_KEY secret is not set — refusing to deploy a build without cloud sync."
            exit 1
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.FIREBASE_MEASUREMENT_ID }}
          # Your own CORS proxy for imports (Cheesefork / YouTube / Panopto), so
          # the site doesn't depend on flaky public proxies. Optional: unset →
          # empty → the app falls back to the public proxy chain. Deploy the
          # worker in workers/cors-proxy/ and set VITE_CORS_PROXY to
          # `https://<worker>.workers.dev/?url={url}` — as EITHER a repo Variable
          # or a Secret (the `||` picks up whichever you used).
          VITE_CORS_PROXY: ${{ vars.VITE_CORS_PROXY || secrets.VITE_CORS_PROXY }}

      - name: Verify deployable artifact
        run: |
          test -f dist/index.html || { echo "::error::dist/index.html missing"; exit 1; }
          test -f dist/CNAME || { echo "::error::dist/CNAME missing — custom domain would break"; exit 1; }

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
